<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panda & Rabbit 💕</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  background: url("panda_rabbit.jpg") center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 1.2s ease;
}

.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.35);
}

.container {
  position: relative;
  z-index: 2;
  background: rgba(255,255,255,0.93);
  border-radius: 22px;
  box-shadow: 0 25px 50px rgba(0,0,0,0.25);
  padding: 40px 30px;
  width: 90%;
  max-width: 420px;
  text-align: center;
}

h1 {
  font-weight: 600;
}

p {
  color: #444;
  font-size: 16px;
}

button {
  padding: 12px 30px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  font-size: 16px;
  margin: 12px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.15);
  transition: all 0.4s ease;
}

button:hover {
  transform: translateY(-2px);
}

.yes {
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
}

.no {
  background: linear-gradient(135deg, #ff4e50, #f9d423);
  position: absolute;
}

.buttons {
  margin-top: 25px;
  position: relative;
  height: 60px;
}

.hidden {
  display: none;
}

.fade {
  animation: fadeIn 1.4s ease forwards;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(15px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

  <!-- PAGE 1 -->
  <div id="page1">
    <h1 id="question">Will you be my Valentine? 💔</h1>
    <div class="buttons">
      <button class="yes" onclick="yesClicked()">YES</button>
      <button class="no" id="noBtn" onclick="noClicked()">NO</button>
    </div>
  </div>

  <!-- PAGE 2 -->
  <div id="page2" class="hidden">
    <h1>💕</h1>
    <p class="fade">
      I caught myself staring you once 👀...<br>
      I have not been able to take my eyes off you ever since<br>
      <strong>My love 🫠❤️</strong>
    </p>
    <button onclick="goToPage3()">Next 💐</button>
  </div>

  <!-- PAGE 3 -->
  <div id="page3" class="hidden">
    <p class="fade">
      <strong>
        Thank you for making me the Happiest Man ever<br>
        by being my Valentine now and forever 💕
      </strong>
    </p>
    <button onclick="goToPage4()">Next 🌙</button>
  </div>

  <!-- PAGE 4 -->
  <div id="page4" class="hidden">
    <h1 class="fade">
      I love you Meri Pyari Priyanshi 🫶🏻❤️
    </h1>
  </div>

</div>

<script>
function yesClicked() {
  document.getElementById("question").innerText =
    "Will you be my Valentine? 💕";

  document.getElementById("page1").classList.add("hidden");
  document.getElementById("page2").classList.remove("hidden");

  document.body.style.background =
    "url('flowers.jpg') center/cover no-repeat";
}

function goToPage3() {
  document.getElementById("page2").classList.add("hidden");
  document.getElementById("page3").classList.remove("hidden");

  document.body.style.background =
    "url('date.jpg') center/cover no-repeat";
}

function goToPage4() {
  document.getElementById("page3").classList.add("hidden");
  document.getElementById("page4").classList.remove("hidden");
}

function noClicked() {
  const btn = document.getElementById("noBtn");
  btn.style.left = Math.random() * 220 + "px";
  btn.style.top = Math.random() * 40 + "px";
}
</script>

</body>
</html>
